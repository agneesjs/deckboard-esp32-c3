<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agneesjs Deck</title>
    <style>
        body {
            background-color: #0f0f17;
            color: #00d4ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 2rem; text-shadow: 0 0 10px #00d4ff; }
        .status { margin-bottom: 20px; font-size: 0.9rem; color: #555; }
        .btn {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 20px 40px;
            margin: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            width: 200px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:active { background: #00d4ff; color: #111; box-shadow: 0 0 20px #00d4ff; }
        .connect-btn { border-color: #00ff88; color: #00ff88; }
        .connect-btn:active { background: #00ff88; color: #111; box-shadow: 0 0 20px #00ff88; }
    </style>
</head>
<body>

    <h1>AGNEESJS DECK</h1>
    <div id="status" class="status">Status: Rozłączono</div>

    <button class="btn connect-btn" onclick="connectBT()">🔗 Połącz Bluetooth</button>
    
    <hr style="width: 80%; border: 0.5px solid #222; margin: 20px 0;">

    <button class="btn" onclick="sendCommand('Matrix')">📺 Matrix</button>
    <button class="btn" onclick="sendCommand('Lock')">🔒 Blokada PC</button>

    <script>
        // UUID muszą być takie same jak w kodzie ESP32
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let device, server, characteristic;

        async function connectBT() {
            const statusLabel = document.getElementById('status');
            try {
                statusLabel.innerText = "Szukanie urządzenia...";
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Agneesjs_Deck' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusLabel.innerText = "Łączenie z serwerem...";
                server = await device.gatt.connect();
                
                statusLabel.innerText = "Pobieranie usługi...";
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                statusLabel.innerText = "Pobieranie charakterystyki...";
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                statusLabel.innerText = "Status: POŁĄCZONO ✅";
                console.log("Połączono pomyślnie!");
                
            } catch (error) {
                console.log("Błąd: " + error);
                statusLabel.innerText = "Błąd: " + error.message;
            }
        }

        async function sendCommand(cmd) {
            if (!characteristic) {
                alert("Najpierw połącz Bluetooth!");
                return;
            }

            try {
                const encoder = new TextEncoder();
                // Wysyłamy tekst zakodowany jako bajty
                await characteristic.writeValue(encoder.encode(cmd));
                console.log("Wysłano komendę: " + cmd);
            } catch (error) {
                console.log("Błąd wysyłania: " + error);
                document.getElementById('status').innerText = "Błąd wysyłania!";
            }
        }
    </script>
</body>
</html>
