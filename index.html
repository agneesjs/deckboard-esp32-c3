<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agneesjs Deck v2</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #00ffcc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #00ffcc;
            margin-bottom: 5px;
        }

        .status-box {
            font-size: 0.8rem;
            margin-bottom: 30px;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 90%;
            max-width: 300px;
        }

        .btn {
            background: #121217;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px #00ffcc;
        }

        .btn-connect {
            border-color: #ff00ff;
            color: #ff00ff;
            margin-bottom: 10px;
        }

        .btn-connect:active {
            background: #ff00ff;
            color: #fff;
            box-shadow: 0 0 20px #ff00ff;
        }

        .btn-off {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-off:active {
            background: #ff4444;
            color: #fff;
            box-shadow: 0 0 20px #ff4444;
        }

        footer {
            margin-top: 40px;
            font-size: 0.6rem;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>AGNEESJS DECK</h1>
    <div id="status" class="status-box">Status: Rozłączono</div>

    <div class="grid">
        <button class="btn btn-connect" onclick="connectBT()">🔗 POŁĄCZ BLUETOOTH</button>
        
        <button class="btn" onclick="sendCommand('Matrix')">📺 MATRIX ON</button>
        <button class="btn btn-off" onclick="sendCommand('OffMatrix')">❌ MATRIX OFF</button>
        <button class="btn" onclick="sendCommand('Lock')">🔒 BLOKADA PC</button>
    </div>

    <footer>CONNECTED VIA BLUEFY</footer>

    <script>
        // Te UUID muszą pasować do kodu w ESP32
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let device, server, characteristic;

        async function connectBT() {
            const statusLabel = document.getElementById('status');
            try {
                statusLabel.innerText = "Szukanie Agneesjs_Deck...";
                
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Agneesjs_Deck' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusLabel.innerText = "Łączenie...";
                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                statusLabel.innerText = "Status: POŁĄCZONO ✅";
                statusLabel.style.color = "#00ffcc";
                
            } catch (error) {
                console.log("Błąd: " + error);
                statusLabel.innerText = "Błąd: Spróbuj ponownie";
                statusLabel.style.color = "#ff4444";
            }
        }

        async function sendCommand(cmd) {
            if (!characteristic) {
                alert("Najpierw kliknij POŁĄCZ BLUETOOTH!");
                return;
            }

            try {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(cmd));
                console.log("Wysłano: " + cmd);
            } catch (error) {
                console.log("Błąd wysyłania: " + error);
            }
        }
    </script>
</body>
</html>
